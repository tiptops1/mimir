<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vision RM — hors ligne</title>
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #f7f8fa; color: #15181e;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #0e1116; color: #e6e9ef; }
  }
  .box { text-align: center; padding: 2rem; }
  .mark {
    width: 56px; height: 56px; border-radius: 14px; background: #4f46e5;
    display: inline-flex; align-items: center; justify-content: center; margin-bottom: 1rem;
  }
  h1 { font-size: 1.15rem; margin: 0 0 .4rem; letter-spacing: -0.012em; }
  p { margin: 0 0 1.2rem; color: #6b7280; font-size: .92rem; }
  button {
    border: 0; border-radius: 8px; background: #4f46e5; color: #fff;
    padding: .6rem 1.2rem; font-size: .9rem; font-weight: 500; cursor: pointer;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" width="30" height="30">
        <path d="M4 19V11m5 8V6m5 13v-9m5 9V8" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>Vous êtes hors ligne</h1>
    <p>Vision RM a besoin d&rsquo;une connexion pour afficher vos données.</p>
    <button onclick="location.reload()">Réessayer</button>
  </div>
</body>
</html>
