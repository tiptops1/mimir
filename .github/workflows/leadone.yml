# Lead One — daily lead-gen pipeline (see scripts/leadone/run.ts).
# 08:15 UTC was chosen for the old Google CSE daily-quota reset; the current
# providers (Tavily + Exa) are monthly, so the hour no longer matters — kept
# as a quiet early-morning slot for Europe.
# Writes directly to Atlas (tenant #1) via the DATABASE_URL secret.
name: Lead One pipeline

on:
  schedule:
    - cron: "15 8 * * *"
  workflow_dispatch: {}

concurrency:
  group: leadone
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # postinstall generates both Prisma clients (generate needs no env vars)
      - run: npm ci
      - run: npx tsx scripts/leadone/run.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          LEADONE_MAX_MINUTES: "35"
